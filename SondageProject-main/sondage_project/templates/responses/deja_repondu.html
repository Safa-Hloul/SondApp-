{% extends 'base.html' %}
{% block title %}Déjà répondu — SondageApp{% endblock %}

{% block content %}
<div class="container py-5 text-center" style="max-width:500px">
  <div class="card border-warning">
    <div class="card-body p-5">
      <i class="bi bi-exclamation-circle-fill text-warning display-3 mb-3 d-block"></i>
      <h3 class="fw-bold mb-2">Déjà répondu</h3>
      <p class="text-muted mb-4">
        Vous avez déjà participé au sondage <strong>« {{ sondage.titre }} »</strong>.
        Ce sondage n'autorise qu'une seule réponse par participant.
      </p>
      <a href="{% url 'liste_publique' %}" class="btn btn-primary">
        <i class="bi bi-grid me-2"></i>Voir d'autres sondages
      </a>
    </div>
  </div>
</div>
{% endblock %}
