{% extends 'base.html' %}
{% block title %}Sondage fermé{% endblock %}

{% block content %}
<div class="container py-5 text-center" style="max-width:500px">
  <i class="bi bi-x-circle-fill text-danger display-3 mb-3 d-block"></i>
  <h3 class="fw-bold">Sondage fermé</h3>
  <p class="text-muted">Le sondage <strong>« {{ sondage.titre }} »</strong> n'accepte plus de réponses.</p>
  <a href="{% url 'liste_publique' %}" class="btn btn-primary mt-2">
    <i class="bi bi-grid me-2"></i>Voir d'autres sondages
  </a>
</div>
{% endblock %}
